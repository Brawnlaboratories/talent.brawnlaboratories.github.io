<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Recruit Dialer - Native</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-deep: #0f172a; --accent: #3b82f6; }
        html, body { height: 100%; height: -webkit-fill-available; margin: 0; padding: 0; overflow: hidden; background: var(--bg-deep); }
        body { color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; width: 100%; -webkit-font-smoothing: antialiased; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .pulse-ring { position: absolute; width: 100%; height: 100%; border: 2px solid var(--accent); border-radius: 50%; opacity: 0; animation: pulse-animation 2s infinite cubic-bezier(0.4, 0, 0.6, 1); }
        @keyframes pulse-animation { 0% { transform: scale(0.85); opacity: 0; } 50% { opacity: 0.4; } 100% { transform: scale(1.6); opacity: 0; } }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.6s ease-out forwards; }
        .dial-button { width: 88px; height: 88px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(59, 130, 246, 0.5); margin: 0 auto; position: relative; z-index: 10; }
        .safe-bottom { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 text-center">

    <!-- Auth Layer -->
    <div id="auth-layer" class="fixed inset-0 z-50 bg-[#0f172a] flex items-center justify-center p-8">
        <div class="w-full max-w-sm space-y-8 animate-fade-in">
            <div class="mb-8 flex flex-col items-center">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl shadow-2xl mb-4">
                    <i class="fas fa-users-rays"></i>
                </div>
                <h1 class="text-2xl font-bold">Recruit Dialer</h1>
                <p class="text-slate-400 text-sm mt-2 font-medium">Native Android Console</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold text-white shadow-lg transition-all active:scale-95">Sign In</button>
                <p id="error-msg" class="text-red-400 text-xs hidden"></p>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden w-full max-w-md space-y-12">
        <header class="flex flex-col items-center space-y-2">
            <h2 class="text-xl font-bold" id="user-status">Native Active</h2>
            <p class="text-slate-500 text-xs uppercase tracking-widest font-black" id="user-email"></p>
        </header>

        <div class="glass-card rounded-[2.5rem] p-10 space-y-8 relative overflow-hidden">
            <div id="pending-state" class="space-y-6">
                <p class="text-slate-400 font-medium">Waiting for Dashboard Signal...</p>
                <div class="relative w-24 h-24 mx-auto mt-8 opacity-50">
                    <div class="pulse-ring"></div>
                    <div class="w-24 h-24 rounded-full bg-slate-800 flex items-center justify-center text-slate-500 text-3xl">
                        <i class="fas fa-satellite-dish animate-pulse"></i>
                    </div>
                </div>
            </div>

            <div id="calling-state" class="hidden space-y-6 animate-fade-in">
                <div>
                    <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2">Remote Call Detected</p>
                    <h1 class="text-3xl font-black text-white" id="candidate-name">Loading...</h1>
                    <p class="text-slate-400 mt-2 text-lg" id="candidate-phone"></p>
                </div>

                <div class="relative py-4 flex flex-col items-center gap-6">
                    <button id="manual-dial-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-3xl font-black text-xl shadow-xl shadow-emerald-600/30 active:scale-95 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-phone"></i> TAP TO CALL
                    </button>
                </div>
            </div>
        </div>

        <button onclick="logout()" class="text-slate-500 hover:text-white text-xs font-bold transition-colors">Sign Out</button>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, signInWithEmailAndPassword, signOut, doc, onSnapshot, updateDoc, serverTimestamp } from "./firebase_config.js";

        // Import Capacitor
        let LocalNotifications = null;
        try {
            // This will fail in browser, which is fine
            import('https://cdn.jsdelivr.net/npm/@capacitor/local-notifications/+esm').then(m => {
                LocalNotifications = m.LocalNotifications;
                LocalNotifications.requestPermissions();
            });
        } catch(e) {}

        // Auth Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-layer').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                setupCallListener(user.uid);
            } else {
                document.getElementById('auth-layer').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        const loginBtn = document.getElementById('login-btn');
        loginBtn.onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if (!email || !pass) return;
            loginBtn.innerText = 'Connecting...';
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                const errEl = document.getElementById('error-msg');
                errEl.innerText = err.message;
                errEl.classList.remove('hidden');
                loginBtn.innerText = 'Sign In';
            }
        };

        window.logout = () => signOut(auth);

        function setupCallListener(uid) {
            const docRef = doc(db, "remote_calls", uid);
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.status === 'pending') {
                        const now = Date.now();
                        const callTime = data.timestamp ? data.timestamp.toMillis() : now;
                        if (now - callTime < 15000) triggerCall(data);
                    }
                }
            });
        }

        async function triggerCall(data) {
            document.getElementById('candidate-name').innerText = data.candidateName;
            document.getElementById('candidate-phone').innerText = data.phoneNumber;
            document.getElementById('pending-state').classList.add('hidden');
            document.getElementById('calling-state').classList.remove('hidden');

            const dialBtn = document.getElementById('manual-dial-btn');
            dialBtn.onclick = () => {
                window.location.href = "tel:" + data.phoneNumber;
                resetUI();
            };

            // Native Local Notification
            if (LocalNotifications) {
                LocalNotifications.schedule({
                    notifications: [{
                        title: "Incoming Call Request",
                        body: `Call ${data.candidateName} (${data.phoneNumber})`,
                        id: 1,
                        schedule: { at: new Date(Date.now() + 100) },
                        sound: null,
                        attachments: null,
                        actionTypeId: "",
                        extra: null
                    }]
                });
            }

            const docRef = doc(db, "remote_calls", auth.currentUser.uid);
            await updateDoc(docRef, { status: 'dialed' });
        }

        function resetUI() {
            setTimeout(() => {
                document.getElementById('pending-state').classList.remove('hidden');
                document.getElementById('calling-state').classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
